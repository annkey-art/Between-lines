<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Between Lines</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #163138;
      color: #eee;
      margin: 0;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-weight: 300;
    }

    p.subtitle {
      color: #aaa;
      margin-bottom: 30px;
    }

    .categories {
      margin-bottom: 25px;
    }

    .categories button,
    .action-btn,
    .share-btn {
      margin: 8px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #006039;
      color: #eee;
      cursor: pointer;
      font-size: 15px;
    }

    .categories button:hover,
    .action-btn:hover,
    .share-btn:hover {
      background: #444;
    }

    .categories button.active {
      background: #8c6b3f;
      color: white;
    }

    .card {
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      max-width: 700px;
      margin: 30px auto 0;
      background: #1b3d45;
      border: 1px solid #2f2f2f;
      border-radius: 12px;
      padding: 24px;
      text-align: left;
    }

    .helper-text {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 20px;
      color: #ddd;
    }

    .joke-image {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
      display: none;
      background: #163138;
    }

    .footer {
      margin-top: 18px;
    }

    .footer img {
      width: 100%;
      max-width: 260px;
      border-radius: 8px;
      display: none;
    }

    .actions {
      margin-top: 25px;
      text-align: center;
    }

    .flower {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 28px;
    }
  </style>
</head>
<body>

  <h1>Between Lines</h1>
  <p class="subtitle">Laugh first. Understand later.</p>

  <div class="categories">
    <button id="corporateBtn" onclick="selectCategory('corporate')">Corporate</button>
    <button id="relationshipBtn" onclick="selectCategory('relationship')">Relationship</button>
    <button id="familyBtn" onclick="selectCategory('family')">Family</button>
    <button id="selfBtn" onclick="selectCategory('self')">About Yourself</button>
    <button id="dailyBtn" onclick="selectCategory('daily')">Daily Life</button>
  </div>

  <div class="card">
    <div id="helperText" class="helper-text">Choose a category. Trouble will be provided.</div>

    <img id="jokeImage" class="joke-image" src="" alt="Joke image">

    <div id="jokeFooter" class="footer">
      <a id="footerLink" href="#" target="_blank">
        <img id="footerImage" src="" alt="Footer image">
      </a>
    </div>

    <div class="actions">
      <button class="action-btn" onclick="showJoke()">Give me trouble</button>
      <button class="share-btn" onclick="shareWhatsApp()">Share on WhatsApp</button>
      <button class="share-btn" onclick="shareEmail()">Share by Email</button>
    </div>
  </div>

  <div class="flower">🃏👻🤡</div>

  <script>
    let currentCategory = "corporate";
    let currentJokeImage = "";

    const jokes = {
      corporate: [
        "images/corporate1.jpg",
        "images/corporate2.jpg",
        "images/corporate3.jpg",
        "images/corporate4.jpg",
        "images/corporate5.jpg",
        "images/corporate6.jpg"
      ],
      relationship: [
        "images/relationship1.jpg",
        "images/relationship2.jpg",
        "images/relationship3.jpg",
        "images/relationship4.jpg",
        "images/relationship5.jpg"
      ],
      family: [
        "images/family1.jpg",
        "images/family2.jpg"
      ],
      self: [
        "images/self1.jpg",
        "images/self2.jpg"
      ],
      daily: [
        "images/daily1.jpg",
        "images/daily2.jpg"
      ]
    };

    const footerImages = {
      corporate: "footers/corporate-footer.jpg",
      relationship: "footers/relationship-footer.jpg",
      family: "footers/family-footer.jpg",
      self: "footers/self-footer.jpg",
      daily: "footers/daily-footer.jpg"
    };

    const footerLinks = {
      corporate: "https://alefnooncurtains.ae",
      relationship: "https://alefinterior.ae",
      family: "https://alefnooncurtains.ae",
      self: "https://annkey-art.github.io/Private-Thinking-Room/",
      daily: "https://dxbly.com"
    };

    function updateActiveButton() {
      document.getElementById("corporateBtn").classList.remove("active");
      document.getElementById("relationshipBtn").classList.remove("active");
      document.getElementById("familyBtn").classList.remove("active");
      document.getElementById("selfBtn").classList.remove("active");
      document.getElementById("dailyBtn").classList.remove("active");

      if (currentCategory === "corporate") {
        document.getElementById("corporateBtn").classList.add("active");
      }
      if (currentCategory === "relationship") {
        document.getElementById("relationshipBtn").classList.add("active");
      }
      if (currentCategory === "family") {
        document.getElementById("familyBtn").classList.add("active");
      }
      if (currentCategory === "self") {
        document.getElementById("selfBtn").classList.add("active");
      }
      if (currentCategory === "daily") {
        document.getElementById("dailyBtn").classList.add("active");
      }
    }

    function updateFooter() {
      const footerImage = document.getElementById("footerImage");
      const footerLink = document.getElementById("footerLink");

      footerImage.src = footerImages[currentCategory];
      footerImage.style.display = "block";
      footerLink.href = footerLinks[currentCategory];
    }

    function selectCategory(category) {
      currentCategory = category;
      updateActiveButton();
      updateFooter();

      document.getElementById("helperText").innerText = "Good choice. Now click “Give me trouble”.";
      document.getElementById("jokeImage").style.display = "none";
      currentJokeImage = "";
    }

    function showJoke() {
      const categoryJokes = jokes[currentCategory];

      if (!categoryJokes || categoryJokes.length === 0) {
        document.getElementById("helperText").innerText = "No jokes here yet. Add one when the mood is right.";
        document.getElementById("jokeImage").style.display = "none";
        return;
      }

      const randomIndex = Math.floor(Math.random() * categoryJokes.length);
      currentJokeImage = categoryJokes[randomIndex];

      document.getElementById("helperText").innerText = "";
      document.getElementById("jokeImage").src = currentJokeImage;
      document.getElementById("jokeImage").style.display = "block";

      updateFooter();
    }

    function shareWhatsApp() {
      if (!currentJokeImage) {
        alert("First generate a joke.");
        return;
      }

      const pageLink = "https://annkey-art.github.io/Between-lines/";
      const text = "Between Lines — laugh first, understand later: " + pageLink;
      const url = "https://wa.me/?text=" + encodeURIComponent(text);
      window.open(url, "_blank");
    }

    function shareEmail() {
      if (!currentJokeImage) {
        alert("First generate a joke.");
        return;
      }

      const pageLink = "https://annkey-art.github.io/Between-lines/";
      const subject = "Between Lines";
      const body = "I found this on Between Lines:\n\n" + pageLink;
      const url = "mailto:?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
      window.location.href = url;
    }

    updateActiveButton();
    updateFooter();
  </script>

</body>
</html>
